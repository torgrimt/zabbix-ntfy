zabbix_export:
  version: '7.0'
  media_types:
    - name: ntfy.sh
      type: WEBHOOK
      parameters:
        - name: HTTPProxy
          value: '{$HTTP_PROXY}'
        - name: Message
          value: '{ALERT.MESSAGE}'
        - name: Nseverity
          value: '{EVENT.NSEVERITY}'
        - name: Password
          value: '{$NTFY.PASS}'
        - name: Subject
          value: '{ALERT.SUBJECT}'
        - name: Token
          value: '{$NTFY.TOKEN}'
        - name: Topic
          value: '{$NTFY.SENDTO}'
        - name: URL
          value: '{$NTFY.URL}'
        - name: Username
          value: '{$NTFY.USER}'
        - name: ZabbixURL
          value: '{$ZABBIX.URL}'
      script: |
        try {
            var params = JSON.parse(value);
            var req = new HttpRequest();

            if (!params.URL || !params.Topic) {
                throw 'Missing required URL or Topic!';
            }

            params.URL = params.URL.replace(/\/+$/, '');
            var fullUrl = params.URL + '/' + encodeURIComponent(params.Topic);

            var sevData = [
                {prio: '1', emoji: 'grey_question'},
                {prio: '2', emoji: 'information_source'},
                {prio: '3', emoji: 'warning'},
                {prio: '3', emoji: 'exclamation'},
                {prio: '4', emoji: 'bangbang'},
                {prio: '5', emoji: 'rotating_light'}
            ];

            var severity = parseInt(params.Nseverity) || 0;
            var currentSev = sevData[severity] || sevData[0];
            var tags = currentSev.emoji;

            if (params.Subject.toLowerCase().indexOf('resolved') !== -1) {
                tags += ',white_check_mark';
            }

            req.addHeader('User-Agent: Zabbix');
            req.addHeader('Content-Type: text/plain');
            req.addHeader('Title: ' + params.Subject);
            req.addHeader('X-Priority: ' + currentSev.prio);
            req.addHeader('X-Tags: ' + tags);

            if (params.HTTPProxy) { req.setProxy(params.HTTPProxy); }

            if (params.Token) {
                req.addHeader('Authorization: Bearer ' + params.Token);
            } else if (params.Username && params.Password) {
                req.setHttpAuth(HTTPAUTH_BASIC, params.Username, params.Password);
            }

            if (params.ZabbixURL) { req.addHeader('Click: ' + params.ZABBIX.URL); }

            var logParams = JSON.parse(value);
            delete logParams.Token;
            delete logParams.Password;
            Zabbix.log(4, '[ ntfy Webhook ] Sending to: ' + fullUrl + ' with params: ' + JSON.stringify(logParams));

            var response = req.post(fullUrl, params.Message);

            if (req.getStatus() < 200 || req.getStatus() >= 300) {
                throw 'HTTP response code: ' + req.getStatus() + '. Response: ' + response;
            }

            return true;
        }
        catch (error) {
            Zabbix.log(3, '[ ntfy Webhook ] Notification failed: ' + error);
            throw 'Sending failed: ' + error;
        }
